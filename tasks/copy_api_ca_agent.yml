---
# Copy k3s API server CA certificate to agent cert store
# This task copies the CA certificate to the location required by k3s agent nodes
# Path: /var/lib/rancher/k3s/agent/server-ca.crt

- name: Ensure agent CA cert directory exists
  ansible.builtin.file:
    path: /var/lib/rancher/k3s/agent
    state: directory
    mode: 0755
  become: true

- name: Copy API server CA certificate to agent cert store
  ansible.builtin.copy:
    src: /tmp/server-ca.crt
    dest: /var/lib/rancher/k3s/agent/server-ca.crt
    mode: 0644
    owner: root
    group: root
  become: true
